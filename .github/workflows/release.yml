name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Download WiX 3.11 portable binaries
        shell: pwsh
        run: |
          $url  = 'https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip'
          $zip  = "$env:TEMP\wix311.zip"
          $dest = "$env:TEMP\wix311"
          Invoke-WebRequest $url -OutFile $zip
          Expand-Archive $zip -DestinationPath $dest
          echo "$dest" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI installer
        run: cargo wix --nocapture

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: mdreader-windows-msi
          path: target/wix/*.msi

      - uses: actions/upload-artifact@v4
        with:
          name: mdreader-windows
          path: target/release/mdreader.exe

  # ── Linux .deb ───────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev pkg-config \
            libgl1-mesa-dev libwayland-dev

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb
        run: cargo deb

      - uses: actions/upload-artifact@v4
        with:
          name: mdreader-linux
          path: target/debian/*.deb

  # ── macOS .app ───────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Build .app bundle
        run: cargo bundle --release

      - name: Zip .app
        run: |
          cd target/release/bundle/osx
          zip -r MDReader.zip "MD Reader.app"

      - uses: actions/upload-artifact@v4
        with:
          name: mdreader-macos
          path: target/release/bundle/osx/MDReader.zip

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mdreader-windows/mdreader.exe
            artifacts/mdreader-windows-msi/*.msi
            artifacts/mdreader-linux/*.deb
            artifacts/mdreader-macos/MDReader.zip
          generate_release_notes: true
